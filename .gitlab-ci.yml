stages:
  - install
  - test
  - build
  - deploy

default:
  image: iqbberlin/aspect-test:latest

test-unit:
  stage: test
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run test

test-e2e:
  stage: test
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - nohup npm run serve-editor-coverage &
    - nohup npm run serve-player-coverage &
    - |
      echo "Waiting for editor..."
      until curl -sSf http://localhost:4201 >/dev/null; do sleep 5; done
      echo "Editor ready!"
      echo "Waiting for player..."
      until curl -sSf http://localhost:4202 >/dev/null; do sleep 5; done
      echo "Player ready!"
    - npm run e2e-coverage
  artifacts:
    when: always
    paths:
      - e2e/downloads/**/*.*
      - e2e/videos/**/*.mp4
      - e2e/screenshots/**/*.png

