<div [style.background-color]="elementModel.styling.backgroundColor">

  <button class="widget-button"
          mat-button
          (click)="emitWidgetCall()">
    {{ 'periodicTable' | translate }}
  </button>

  <div class="elements-container">
    @for (element of (elementModel.state | split); track element) {
      <div class="element-square">{{ element }}</div>
    }
  </div>
</div>
